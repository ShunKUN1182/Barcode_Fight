<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>スキャン</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/ress.css" />
        <link rel="stylesheet" href="css/scan.css" />
        <script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>
        <script src="js/scan.js" defer></script>
    </head>
    <body>
        <main>
            <p>
                1Pのバーコードを<br />
                スキャンしてください
            </p>
            <div class="barcode_box">
                <div id="camera"></div>
            </div>
            <p id="result"></p>
            <div class="start_btn back">
                <div class="btn_inner">
                    <h2><a href="index.html">もどる</a></h2>
                </div>
            </div>
        </main>
        <div class="modal">
            <p>はっけん！</p>
            <div class="chara_card"></div>
            <div class="card_text">
                <h2>平和なおさかなさん</h2>
                <div class="card_status">
                    <div class="status_icon">
                        <h3>HP</h3>
                        <p id="hpStats">8888</p>
                    </div>
                    <div class="status_icon">
                        <h3>ATK</h3>
                        <p id="atkStats">8888</p>
                    </div>
                    <div class="status_icon">
                        <h3>SPD</h3>
                        <p id="spdStats">8888</p>
                    </div>
                </div>
            </div>
            <div class="btns">
                <div class="start_btn">
                    <div class="btn_inner">
                        <h2><a href="scan.html">2Pのコードをスキャンする</a></h2>
                    </div>
                </div>
                <div class="btns_second">
                    <div class="start_btn cancel">
                        <div class="btn_inner">
                            <h2><a href="index.html">やめる</a></h2>
                        </div>
                    </div>
                    <div class="start_btn reset">
                        <div class="btn_inner">
                            <h2><a href="scan.html" id="resetbtn">やりなおす</a></h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
